<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的自我介紹</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f7fa;
            color: #333;
        }

        header {
            background-color: #4a90e2;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: 30px auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            border-left: 5px solid #4a90e2;
            padding-left: 10px;
        }

        ul {
            padding-left: 20px;
        }

        .profile {
            text-align: center;
        }

        .profile img {
            width: 120px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #ddd;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<header>
    <h1>我的自我介紹</h1>
    <nav>
        <a href="#about">關於我</a>
        <a href="#skills">技能</a>
        <a href="#contact">聯絡</a>
    </nav>
</header>

<div class="container">

    <div class="card profile">
        <img src="https://via.placeholder.com/120" alt="個人照片">
        <h2>你的名字</h2>
        <p>學生 / 網頁開發學習者</p>
    </div>

    <div class="card" id="about">
        <h2>關於我</h2>
        <p>你好！我是XXX，目前正在學習網頁開發。</p>
        <p>我對設計與程式充滿興趣，目標成為前端工程師。</p>
    </div>

    <div class="card" id="skills">
        <h2>我的技能</h2>
        <ul>
            <li>HTML / CSS</li>
            <li>JavaScript（基礎）</li>
            <li>Git / GitHub</li>
        </ul>
    </div>

    <div class="card" id="contact">
        <h2>聯絡方式</h2>
        <p>Email：example@email.com</p>
        <p>Instagram：your_account</p>
    </div>

</div>

<footer>
    <p>© 2026 你的名字</p>
</footer>

</body>
</html>
